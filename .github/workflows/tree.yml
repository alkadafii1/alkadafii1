name: Generate Contribution Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake (used as base animation)
        uses: Platane/snk@v3
        with:
          github_user_name: alkadafii1
          outputs: |
            dist/tree.svg?palette=github-dark&color_snake=green&color_dots=#144d2a,#1f7a3d,#2ecc71,#7bed9f,#c7f9cc

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
