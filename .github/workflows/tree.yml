name: Generate Tree Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: alkadafii1
          outputs: |
            dist/tree.svg?palette=github-dark&color_snake=green&color_dots=#144d2a,#1f7a3d,#2ecc71,#7bed9f,#c7f9cc

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
